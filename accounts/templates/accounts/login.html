{% load static %}
<!DOCTYPE html>
<html lang="en" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acadvault | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1.5rem; }
        .card { width: 100%; max-width: 420px; }
        @keyframes fadeInUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:none; } }
        .fade-in { animation: fadeInUp 0.55s ease forwards; }
        input:focus { outline: none; }
    </style>
    <script>
        tailwind.config = { darkMode: 'class' };
        (function() {
            const t = localStorage.getItem('theme');
            const sys = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (t === 'dark' || (!t && sys)) document.documentElement.classList.add('dark');
        })();
        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateIcon(isDark);
        }
        function updateIcon(isDark) {
            const btn = document.getElementById('theme-btn');
            if (!btn) return;
            btn.innerHTML = isDark
                ? `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>`
                : `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>`;
        }
        window.onload = () => updateIcon(document.documentElement.classList.contains('dark'));
    </script>
</head>
<body class="bg-gradient-to-br from-blue-50 via-white to-indigo-50 dark:from-slate-950 dark:via-slate-900 dark:to-slate-950 text-slate-900 dark:text-slate-100">

    <button id="theme-btn" onclick="toggleTheme()" class="fixed top-4 right-4 p-2 rounded-full text-slate-500 dark:text-slate-400 hover:bg-white dark:hover:bg-slate-800 shadow-sm transition" aria-label="Toggle theme"></button>

    <div class="card fade-in">
        <!-- Logo -->
        <div class="flex justify-center mb-8">
            <img src="{% static 'img/acadvault-logo.png' %}" alt="Acadvault" class="h-28 w-auto object-contain">
        </div>

        <!-- Card -->
        <div class="bg-white dark:bg-slate-800 rounded-3xl shadow-2xl shadow-slate-200/60 dark:shadow-slate-950/60 p-8 border border-slate-100 dark:border-slate-700">
            <h1 class="text-2xl font-extrabold text-slate-800 dark:text-slate-100 mb-1">Welcome back</h1>
            <p class="text-sm text-slate-500 dark:text-slate-400 mb-7">Sign in to your portal account</p>

            {% if messages %}
            <div class="mb-5 p-4 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-xl text-left">
                <ul class="list-none p-0 m-0 text-sm font-medium text-red-700 dark:text-red-300 space-y-1">
                    {% for message in messages %}<li>{{ message }}</li>{% endfor %}
                </ul>
            </div>
            {% endif %}

            <form method="POST" action="{% url 'login' %}">
                {% csrf_token %}
                <div class="mb-4">
                    <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5" for="username">Username</label>
                    <input type="text" name="username" id="username" required placeholder="Enter your username"
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition text-sm">
                </div>
                <div class="mb-5">
                    <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5" for="password">Password</label>
                    <input type="password" name="password" id="password" required placeholder="••••••••"
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition text-sm">
                </div>
                <div class="flex justify-start items-center mb-6">
                    <label class="flex items-center gap-2 text-sm text-slate-600 dark:text-slate-400 cursor-pointer select-none">
                        <input type="checkbox" name="remember" class="h-4 w-4 rounded border-slate-300 dark:border-slate-600 text-blue-600 focus:ring-blue-500 bg-white dark:bg-slate-700 cursor-pointer">
                        Remember me
                    </label>
                </div>
                <button type="submit" class="w-full py-3.5 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow-lg shadow-blue-600/25 hover:shadow-blue-600/40 transition text-sm tracking-wide uppercase">
                    Sign In
                </button>
            </form>

            <p class="mt-6 text-sm text-center text-slate-500 dark:text-slate-400">
                No account yet?
                <a href="{% url 'register' %}" class="font-bold text-blue-600 dark:text-blue-400 hover:underline ml-1">Register Now</a>
            </p>
        </div>

        <p class="mt-6 text-center text-xs text-slate-400 dark:text-slate-600">© 2026 Acadvault Systems</p>
    </div>
</body>
</html>
