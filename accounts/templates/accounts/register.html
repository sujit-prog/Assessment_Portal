{% load static %}
<!DOCTYPE html>
<html lang="en" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acadvault | Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1.5rem; }
        input:focus, select:focus { outline: none; }
        @keyframes fadeInUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:none; } }
        .fade-in { animation: fadeInUp 0.55s ease forwards; }
    </style>
    <script>
        tailwind.config = { darkMode: 'class' };
        (function() {
            const t = localStorage.getItem('theme');
            if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) document.documentElement.classList.add('dark');
        })();
        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateIcon(isDark);
        }
        function updateIcon(isDark) {
            const btn = document.getElementById('theme-btn');
            if (!btn) return;
            btn.innerHTML = isDark
                ? `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>`
                : `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>`;
        }
        window.onload = () => updateIcon(document.documentElement.classList.contains('dark'));
    </script>
</head>
<body class="bg-gradient-to-br from-blue-50 via-white to-indigo-50 dark:from-slate-950 dark:via-slate-900 dark:to-slate-950 text-slate-900 dark:text-slate-100">

    <button id="theme-btn" onclick="toggleTheme()" class="fixed top-4 right-4 p-2 rounded-full text-slate-500 dark:text-slate-400 hover:bg-white dark:hover:bg-slate-800 shadow-sm transition" aria-label="Toggle theme"></button>

    <div class="w-full max-w-[440px] fade-in">
        <!-- Logo -->
        <div class="flex justify-center mb-8">
            <img src="{% static 'img/acadvault-logo.png' %}" alt="Acadvault" class="h-24 w-auto object-contain">
        </div>

        <!-- Card -->
        <div class="bg-white dark:bg-slate-800 rounded-3xl shadow-2xl shadow-slate-200/60 dark:shadow-slate-950/60 p-8 border border-slate-100 dark:border-slate-700">
            <h1 class="text-2xl font-extrabold text-slate-800 dark:text-slate-100 mb-1">Create an account</h1>
            <p class="text-sm text-slate-500 dark:text-slate-400 mb-7">Join the portal to access your assessments</p>

            {% if messages %}
            <div class="mb-5 space-y-2">
                {% for message in messages %}
                <div class="p-3 rounded-xl text-sm font-medium
                    {% if message.tags == 'error' %}bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 text-red-700 dark:text-red-300
                    {% elif message.tags == 'success' %}bg-emerald-50 dark:bg-emerald-900/20 border border-emerald-200 dark:border-emerald-800 text-emerald-700 dark:text-emerald-300
                    {% else %}bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800 text-blue-700 dark:text-blue-300{% endif %}">
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}

            <form method="POST" action="{% url 'register' %}">
                {% csrf_token %}

                <div class="mb-4">
                    <label for="user_type" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">I am a</label>
                    <select id="user_type" name="user_type" required
                        class="w-full px-4 py-3 border border-slate-200 dark:border-slate-600 rounded-xl bg-slate-50 dark:bg-slate-700 text-slate-900 dark:text-slate-100 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition text-sm cursor-pointer">
                        <option value="student">Student</option>
                        <option value="teacher">Teacher / Admin</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label for="name" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Full Name</label>
                    <input type="text" id="name" name="name" required placeholder="John Doe"
                        class="w-full px-4 py-3 border border-slate-200 dark:border-slate-600 rounded-xl bg-slate-50 dark:bg-slate-700 text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition text-sm">
                </div>

                <div class="mb-4">
                    <label for="username" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Username</label>
                    <input type="text" id="username" name="username" required placeholder="S1234567"
                        class="w-full px-4 py-3 border border-slate-200 dark:border-slate-600 rounded-xl bg-slate-50 dark:bg-slate-700 text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition text-sm">
                </div>

                <div class="mb-4">
                    <label for="email" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Email</label>
                    <input type="email" id="email" name="email" required placeholder="email@school.edu"
                        class="w-full px-4 py-3 border border-slate-200 dark:border-slate-600 rounded-xl bg-slate-50 dark:bg-slate-700 text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition text-sm">
                </div>

                <div class="mb-4">
                    <label for="password" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Password</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••"
                        class="w-full px-4 py-3 border border-slate-200 dark:border-slate-600 rounded-xl bg-slate-50 dark:bg-slate-700 text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition text-sm">
                </div>

                <div class="mb-6">
                    <label for="confirm-password" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Confirm Password</label>
                    <input type="password" id="confirm-password" name="confirm-password" required placeholder="••••••••"
                        class="w-full px-4 py-3 border border-slate-200 dark:border-slate-600 rounded-xl bg-slate-50 dark:bg-slate-700 text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition text-sm">
                </div>

                <button type="submit" class="w-full py-3.5 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow-lg shadow-blue-600/25 hover:shadow-blue-600/40 transition text-sm tracking-wide uppercase">
                    Create Account
                </button>
            </form>

            <p class="mt-6 text-sm text-center text-slate-500 dark:text-slate-400">
                Already have an account?
                <a href="{% url 'login' %}" class="font-bold text-blue-600 dark:text-blue-400 hover:underline ml-1">Sign In</a>
            </p>
        </div>

        <p class="mt-6 text-center text-xs text-slate-400 dark:text-slate-600">© 2026 Acadvault Systems</p>
    </div>
</body>
</html>
